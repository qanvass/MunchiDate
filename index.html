    <!-- Service Worker Registration & Advanced Capabilities -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(async (reg) => {
              console.log('Service worker registered successfully:', reg.scope);
              
              // Register Background Sync specials updates
              if ('sync' in reg) {
                try {
                  await reg.sync.register('sync-specials');
                  console.log('PWA Background Sync registered.');
                } catch (err) {
                  console.log('Background sync registration failed:', err);
                }
              }
              
              // Register Periodic Background Sync if supported
              if ('periodicSync' in reg) {
                try {
                  const status = await navigator.permissions.query({
                    name: 'periodic-background-sync',
                  });
                  if (status.state === 'granted') {
                    await reg.periodicSync.register('periodic-specials-sync', {
                      minInterval: 24 * 60 * 60 * 1000, // 24 hours
                    });
                    console.log('PWA Periodic Background Sync active.');
                  }
                } catch (err) {
                  console.log('Periodic sync registration failed:', err);
                }
              }
            })
            .catch((err) => console.log('Service worker registration failed:', err));
        });
      }
    </script>
